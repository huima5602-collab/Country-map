toLowerCase().includes(q)))}function render(){let l=list();$('count').textContent=l.length+' / '+data.length;draw(l);rank(l)}function draw(l){$('marks').innerHTML='';l.forEach(c=>{let [x,y]=pos(c),g=document.createElementNS('http://www.w3.org/2000/svg','g');g.setAttribute('class','pin '+(c.en===cur.en?'active':''));g.setAttribute('transform',`translate(${x},${y})`);g.innerHTML=`<circle class="outer" r="15"/><circle class="inner" r="5"/><text x="12" y="-10">${name(c)}</text>`;g.onclick=()=>show(c);$('marks').append(g)})}function rank(l){$('rank').innerHTML='';l.sort((a,b)=>a.rank-b.rank).forEach(c=>{let d=document.createElement('div');d.className='rank '+(c.en===cur.en?'active':'');d.innerHTML=`<div class="rankNo">${c.rank}</div><div><b>${c.flag} ${name(c)}</b><small>${con(c)} · ${land(c)}</small></div><div class="money">$${c.gdp.toFixed(2)}T</div>`;d.onclick=()=>show(c);$('rank').append(d)})}function show(c){cur=c;render();let isFav=favorites.includes(c.en);$('country').innerHTML=`<div class="top"><div class="flag">${c.flag}</div><div><h2>${name(c)}</h2><p>${c.en} · ${con(c)}</p></div><button class="star ${isFav?'on':''}" title="Favorite">★</button></div><div class="chips"><span class="chip">GDP #${c.rank}</span><span class="chip">${tr('capital')} ${c.cap}</span><span class="chip">${tr('density')} ${dens(c)}/km²</span></div><div class="facts"><div class="fact"><small>${tr('gdp')}</small><b>$${c.gdp.toFixed(2)}T</b></div><div class="fact"><small>${tr('population')}</small><b>${fmt(c.pop)}</b></div><div class="fact"><small>${tr('area')}</small><b>${c.area.toLocaleString()} km²</b></div><div class="fact"><small>${tr('currency')}</small><b>${c.cur}</b></div><div class="fact"><small>${tr('language')}</small><b>${c.lang}</b></div><div class="fact"><small>${tr('landmark')}</small><b>${land(c)}</b></div></div><div class="story"><b>${tr('feature')}：</b>${feat(c)}</div>`;document.querySelector('.star').onclick=toggleFav;drawTimeline(c);cmp();ai(c);renderFav();if(globeObj)globeObj.pointOfView({lat:c.lat,lng:c.lon,altitude:1.4},900)}function ai(c){$('aiText').textContent=lang==='zh'?`${name(c)}位于${con(c)}，首都为${c.cap}。它拥有约${fmt(c.pop)}人口和${c.area.toLocaleString()}平方公里国土面积，名义GDP约为${c.gdp.toFixed(2)}万亿美元，全球排名第${c.rank}。${land(c)}是其代表性地标，国家特色集中体现在${feat(c)}。`:`${name(c)} is located in ${con(c)} with ${c.cap} as its capital. It has about ${fmt(c.pop)} people and ${c.area.toLocaleString()} km² of land area. Its nominal GDP is about $${c.gdp.toFixed(2)} trillion, ranked #${c.rank}. ${land(c)} is a notable landmark, while its identity is strongly connected with ${feat(c)}.`}function drawTimeline(c){let cv=$('timeline'),ctx=cv.getContext('2d'),w=cv.width=cv.clientWidth*devicePixelRatio,h=cv.height=220*devicePixelRatio,vals=hist(c),max=Math.max(...vals)*1.08,min=Math.min(...vals)*.92;ctx.clearRect(0,0,w,h);ctx.scale(devicePixelRatio,devicePixelRatio);let W=cv.clientWidth,H=220,p=32;ctx.strokeStyle='#e5e7eb';ctx.lineWidth=1;for(let i=0;i<5;i++){let y=p+(H-2*p)*i/4;ctx.beginPath();ctx.moveTo(p,y);ctx.lineTo(W-p,y);ctx.stroke()}ctx.strokeStyle='#2563eb';ctx.lineWidth=3;ctx.beginPath();vals.forEach((v,i)=>{let x=p+(W-2*p)*i/(vals.length-1),y=H-p-(v-min)/(max-min)*(H-2*p);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();ctx.fillStyle='#111827';ctx.font='12px Arial';ctx.fillText(tr('history'),p,18);ctx.fillStyle='#667085';ctx.fillText('2016',p,H-8);ctx.fillText('2026',W-p-32,H-8);ctx.setTransform(1,0,0,1,0,0)}function cmp(){let a=data.find(c=>c.en===$('a').value)||data[0],b=data.find(c=>c.en===$('b').value)||data[1];$('cmp').innerHTML=`<table class="table"><tr><th>${lang==='zh'?'指标':'Metric'}</th><th>${name(a)}</th><th>${name(b)}</th></tr><tr><td>GDP</td><td>$${a.gdp.toFixed(2)}T</td><td>$${b.gdp.toFixed(2)}T</td></tr><tr><td>${tr('population')}</td><td>${fmt(a.pop)}</td><td>${fmt(b.pop)}</td></tr><tr><td>${tr('area')}</td><td>${a.area.toLocaleString()}</td><td>${b.area.toLocaleString()}</td></tr><tr><td>${tr('density')}</td><td>${dens(a)}/km²</td><td>${dens(b)}/km²</td></tr><tr><td>${tr('currency')}</td><td>${a.cur}</td><td>${b.cur}</td></tr></table>`}function toggleFav(){let i=favorites.indexOf(cur.en);i>=0?favorites.splice(i,1):favorites.push(cur.en);localStorage.setItem('countryFavs',JSON.stringify(favorites));show(cur)}function renderFav(){let box=$('fav');box.innerHTML='';if(!favorites.length){box.innerHTML=`<span style="color:var(--muted)">${tr('empty')}</span>`;return}favorites.forEach(en=>{let c=data.find(x=>x.en===en);if(!c)return;let b=document.createElement('button');b.className='fav';b.textContent=c.flag+' '+name(c);b.onclick=()=>show(c);box.append(b)})}let globeObj=null;function initGlobe(){try{if(typeof Globe==='undefined')throw 0;let el=$('globe');el.classList.remove('loading');globeObj=Globe()(el).globeImageUrl('https://unpkg.com/globe.gl/example/img/earth-blue-marble.jpg').backgroundColor('rgba(0,0,0,0)').pointLat(d=>d.lat).pointLng(d=>d.lon).pointLabel(d=>name(d)).pointColor(d=>d.en===cur.en?'#f59e0b':'#06b6d4').pointAltitude(.03).pointRadius(.18).pointsData(data).onPointClick(show);globeObj.pointOfView({lat:20,lng:0,altitude:1.7})}catch(e){$('globe').classList.remove('loading');$('globe').innerHTML='<div style="color:white;display:grid;place-items:center;height:100%;font-weight:900;font-size:28px">🌍 3D Globe</div>'}}document.addEventListener('DOMContentLoaded',init);
